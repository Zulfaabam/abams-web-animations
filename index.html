<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn GSAP & LENIS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lenis@1.3.23/dist/lenis.css"
    />
  </head>
  <body>
    <nav class="max-w-5xl mx-auto py-2">
      <h1 class="text-center">GSAP & Lenis Experiments</h1>
    </nav>
    <div class="max-w-6xl mx-auto grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-2 lg:gap-6">
      <a
        href="/stacking-small-card/index.html"
        class="group relative flex cursor-pointer flex-col overflow-hidden transition-all duration-300 hover:-translate-y-1 hover:border-gray-100 hover:shadow-xl hover:shadow-gray/50 bg-white p-4 pb-8 shadow-xl rounded-sm border border-gray-200"
      >
        <div
          class="relative flex flex-1 items-center justify-center overflow-hidden bg-neutral-950 aspect-video"
        >
          <img
            src="/stacking-small-card/image.png"
            alt="Stacking Small Card"
            class="pointer-events-none object-cover h-full w-full border-none"
          ></img>
        </div>
      </a>
    </div>
    <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <!-- ScrollSmoother requires ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollSmoother.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollToPlugin.min.js"></script>
    <!-- <script src="script.js"></script> -->
  </body>
</html>
