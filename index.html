<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn GSAP & LENIS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lenis@1.3.23/dist/lenis.css"
    />
  </head>
  <body
    class="bg-[#fff8f1] text-[#1e1b14] font-['Plus_Jakarta_Sans'] antialiased"
  >
    <!-- Hero Section -->
    <section class="max-w-7xl mx-auto px-8 py-10 flex flex-col">
      <h1
        class="font-['Space_Grotesk'] text-[#031632] text-4xl sm:text-7xl md:text-9xl font-bold leading-[1.1] tracking-[-0.02em] max-w-4xl"
      >
        Web
        <br />
        Animations
        <span
          class="font-['Plus_Jakarta_Sans'] text-[#44474d] text-sm md:text-lg font-[400] max-w-2xl tracking-normal -ml-4"
        >
          by
          <a
            href="http://abams-folio.netlify.app/"
            target="_blank"
            rel="noopener noreferrer"
            class="underline decoration-wavy hover:text-[#865041] transition-colors duration-300"
          >
            Abams
          </a>
        </span>
      </h1>
      <p></p>
    </section>

    <!-- Grid Style List (Zones) -->
    <section class="max-w-7xl mx-auto px-8 pb-32">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Modular Card -->
        <a
          href="/stacking-small-card/index.html"
          class="group relative block rounded-lg overflow-hidden shadow-[0_16px_40px_rgba(3,22,50,0.05)] bg-[#ffffff] transition-transform duration-500 hover:-translate-y-2"
        >
          <!-- Image Mask (Sharp 0px corner) -->
          <div class="aspect-video overflow-hidden rounded-none">
            <img
              src="/stacking-small-card/thumbnail.gif"
              alt="Stacking Small Card"
              class="object-fill w-full h-full transition-transform duration-700 group-hover:scale-105"
            />
          </div>
          <!-- Glassmorphism Text Overlay -->
          <div class="flex flex-col justify-end p-4">
            <span
              class="font-['Inter'] text-[0.75rem] font-[600] uppercase tracking-[0.08em] text-[#865041]"
            >
              Scroll Animation
            </span>
            <h3
              class="font-['Space_Grotesk'] text-[#031632] text-2xl font-medium"
            >
              Self Stacking Small Cards
            </h3>
          </div>
        </a>
      </div>
    </section>

    <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <!-- ScrollSmoother requires ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollSmoother.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollToPlugin.min.js"></script>
    <!-- <script src="script.js"></script> -->
  </body>
</html>
