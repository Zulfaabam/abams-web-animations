<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn GSAP & LENIS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lenis@1.3.23/dist/lenis.css"
    />
  </head>
  <body class="overflow-x-hidden">
    <section
      class="w-full h-[50vh] flex justify-center items-center x-auto py-2 bg-gray-900 text-white"
    >
      <h1 class="text-center text-5xl">Scroll Down to see the magic!</h1>
    </section>
    <section
      class="sticky-cards relative overflow-hidden bg-[#fff8f1] w-screen h-screen"
    >
      <!-- Card 1 -->
      <div
        class="card absolute w-80 bg-white p-4 pb-8 shadow-xl rounded-sm border border-gray-200"
      >
        <img
          src="https://images.unsplash.com/photo-1554629947-334ff61d85dc?w=600&h=600&fit=crop"
          alt="Mountain Landscape"
          class="w-full aspect-square object-cover mb-4 bg-gray-100"
        />
        <p
          class="text-center text-xl font-semibold text-gray-800 font-['Space_Grotesk']"
        >
          Mountain
        </p>
      </div>

      <!-- Card 2 -->
      <div
        class="card absolute w-80 bg-white p-4 pb-8 shadow-xl rounded-sm border border-gray-200"
      >
        <img
          src="https://images.unsplash.com/photo-1511576661531-b34d7da5d0bb?w=600&h=600&fit=crop"
          alt="Ocean View"
          class="w-full aspect-square object-cover mb-4 bg-gray-100"
        />
        <p
          class="text-center text-xl font-semibold text-gray-800 font-['Space_Grotesk']"
        >
          Streets
        </p>
      </div>

      <!-- Card 3 -->
      <div
        class="card absolute w-80 bg-white p-4 pb-8 shadow-xl rounded-sm border border-gray-200"
      >
        <img
          src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=600&h=600&fit=crop"
          alt="Nature"
          class="w-full aspect-square object-cover mb-4 bg-gray-100"
        />
        <p
          class="text-center text-xl font-semibold text-gray-800 font-['Space_Grotesk']"
        >
          Serenity
        </p>
      </div>

      <!-- Card 4 -->
      <div
        class="card absolute w-80 bg-white p-4 pb-8 shadow-xl rounded-sm border border-gray-200"
      >
        <img
          src="https://images.unsplash.com/photo-1472190649224-495422e1b602?w=600&h=600&fit=crop"
          alt="Landscape"
          class="w-full aspect-square object-cover mb-4 bg-gray-100"
        />
        <p
          class="text-center text-xl font-semibold text-gray-800 font-['Space_Grotesk']"
        >
          Horizons
        </p>
      </div>

      <!-- Card 5 -->
      <div
        class="card absolute w-80 bg-white p-4 pb-8 shadow-xl rounded-sm border border-gray-200"
      >
        <img
          src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600&h=600&fit=crop"
          alt="Starry Night"
          class="w-full aspect-square object-cover mb-4 bg-gray-100"
        />
        <p
          class="text-center text-xl font-semibold text-gray-800 font-['Space_Grotesk']"
        >
          Night Sky
        </p>
      </div>
    </section>
    <section
      class="w-full h-[50vh] flex justify-center items-center x-auto py-2 bg-gray-900 text-white"
    >
      <h1 class="text-center text-5xl">Self Stacking Small Card!</h1>
    </section>

    <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <!-- ScrollSmoother requires ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollSmoother.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollToPlugin.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
